<div class="w-full px-6 py-4">
  <div class="mb-6 flex items-center justify-between">
    <h2 class="text-3xl font-bold text-slate-800">Mantenedor de estados de tarea</h2>

    <button
      mat-raised-button
      color="primary"
      type="button"
      (click)="abrirModalCrear()">
      Nuevo estado
    </button>
  </div>

  @if (estados().length === 0) {
    <div class="bg-white rounded-2xl shadow p-8 text-center text-slate-500">
      No hay estados de tarea registrados.
    </div>
  } @else {
    <div class="overflow-x-auto rounded-xl bg-white shadow">
      <table mat-table [dataSource]="estados()" class="w-full">

        <ng-container matColumnDef="idEstadoTarea">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let estado">
            {{ estado.idEstadoTarea }}
          </td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let estado">
            {{ estado.nombre }}
          </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let estado">
            <div class="flex gap-2">
              <button
                mat-flat-button
                color="accent"
                type="button"
                (click)="abrirModalEditar(estado)">
                Editar
              </button>

              <button
                mat-flat-button
                color="warn"
                type="button"
                (click)="confirmarEliminar(estado.idEstadoTarea)">
                Eliminar
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columnasAMostrar"></tr>
        <tr mat-row *matRowDef="let row; columns: columnasAMostrar;"></tr>
      </table>
    </div>
  }

  <div class="mt-6">
    <mat-paginator
      showFirstLastButtons
      [length]="cantidadTotalRegistros"
      [pageIndex]="paginacion.pagina - 1"
      [pageSize]="paginacion.recordsPorPagina"
      [pageSizeOptions]="[5, 10, 50]"
      (page)="actualizarPaginacion($event)">
    </mat-paginator>
  </div>
</div>

<app-modal-estado-tarea
  [abierto]="mostrarModal()"
  [modo]="modoModal()"
  [estado]="estadoSeleccionado()"
  (cerrado)="cerrarModal()"
  (guardado)="guardado()">
</app-modal-estado-tarea>

<app-modal-confirmacion
  [abierto]="mostrarConfirmacion()"
  titulo="Eliminar estado de tarea"
  mensaje="Esta acción no se puede deshacer."
  (confirmado)="eliminarConfirmado()"
  (cancelado)="cancelarEliminar()">
</app-modal-confirmacion>
