<nav class="bg-slate-800 border-b border-slate-700">
  <div class="w-full px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">

      <!-- IZQUIERDA -->
      <div class="flex items-center gap-6">

        <!-- Logo -->
        <div class="flex-shrink-0 text-white font-bold text-lg">
          TaskFlow
        </div>

        <!-- Links desktop -->
        <div class="hidden md:flex gap-4">
          <a [routerLink]="['/tareas']" routerLinkActive="font-medium text-white bg-slate-900" href="#" class="px-3 py-2 rounded-md text-sm text-slate-300 hover:bg-slate-700">
            Tareas
          </a>
          <a [routerLink]="['/estado-tarea']" routerLinkActive="font-medium text-white bg-slate-900" href="#" class="px-3 py-2 rounded-md text-sm text-slate-300 hover:bg-slate-700">
            Estados
          </a>
          <a [routerLink]="['/prioridad-tarea']" routerLinkActive="font-medium text-white bg-slate-900" href="#" class="px-3 py-2 rounded-md text-sm text-slate-300 hover:bg-slate-700">
            Prioridades
          </a>
        </div>
      </div>

      <!-- DERECHA -->
      <div class="flex items-center gap-3">

        <!-- Botón móvil -->
        <button
          class="md:hidden text-slate-300 hover:text-white"
          (click)="toggleMenuMovil()">
          ☰
        </button>

        <!-- Usuario -->
        <div class="relative">
          <button
            class="flex items-center gap-2 rounded-full focus:outline-none"
            (click)="toggleUserMenu()">

            <img
              src="./imagenes/usuario.png"
              class="w-8 h-8 rounded-full"
              alt="user" />

          </button>

          <!-- Dropdown -->
          @if (menuUsuarioAbierto()) {
            <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg overflow-hidden z-50">
             
              <button
                class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100"
                (click)="logout()">
                Cerrar sesión
              </button>

            </div>
          }
        </div>

      </div>
    </div>

    <!-- MENÚ MÓVIL -->
    @if (menuMovilAbierto()) {
      <div class="md:hidden mt-2 space-y-1">

        <a [routerLink]="['/tareas']" routerLinkActive="font-medium text-white bg-slate-900"  class="block px-3 py-2 rounded-md text-white bg-slate-900">
          Tareas
        </a>

        <a [routerLink]="['/estado-tarea']" routerLinkActive="font-medium text-white bg-slate-900" class="block px-3 py-2 rounded-md text-slate-300 hover:bg-slate-700">
          Estados
        </a>

        <a [routerLink]="['/prioridad-tarea']" routerLinkActive="font-medium text-white bg-slate-900" class="block px-3 py-2 rounded-md text-slate-300 hover:bg-slate-700">
          Prioridades
        </a>

      </div>
    }

  </div>
</nav>
